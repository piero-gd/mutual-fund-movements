# ─── Application ──────────────────────────────────────────────────────────────
spring.application.name=mutual-fund-movements
server.port=8080

# ─── H2 In-Memory Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:mutualfunddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (development only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Garantiza que data.sql se ejecute después de que Hibernate cree el esquema
spring.jpa.defer-datasource-initialization=true
